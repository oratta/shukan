name: Deploy to Production

on:
  # 手動トリガーのみ（承認ゲート付き）
  workflow_dispatch:
    inputs:
      confirm:
        description: '本番デプロイを実行しますか？'
        required: true
        type: boolean
        default: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  NODE_VERSION: '22'

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # GitHub Environment "Production" で approval gate を設定
    environment:
      name: Production
      url: https://${{ vars.PRODUCTION_DOMAIN }}
    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'true' }}
        run: |
          echo "::error::デプロイが確認されていません。confirm を true にしてください。"
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Remove .git to bypass Vercel author check
        run: rm -rf .git

      - name: Deploy to Vercel (Production)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Summary
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          PRODUCTION_DOMAIN: ${{ vars.PRODUCTION_DOMAIN }}
        run: |
          {
            echo "### Production Deploy Complete"
            echo "- Deployment: $DEPLOY_URL"
            echo "- Production: https://$PRODUCTION_DOMAIN"
          } >> "$GITHUB_STEP_SUMMARY"
